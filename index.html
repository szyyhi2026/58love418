<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE NEST - з§ҒеҜҶз©әй—ҙ</title>
    <style>
        :root {
            --primary: #f1f5f6;
            --secondary: #d2e6ec;

            --highlight: #e1b2b2;

            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;

            --bubble-font-size: 12.5px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .header-user-left:hover { background: rgba(0,0,0,0.03); }

        .header-avatar-sm img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .header-user-name { font-weight: 600; font-size: 12px; color: var(--text); }

        .call-embed-bar.show { display: flex; }

        .embed-minimize { background: rgba(0,0,0,0.06); color: var(--text); } .embed-hangup { background: #e05555; color: #fff; }
        .story-mode-bar { display: none; background: #fffbe6; border-bottom: 1px solid #e8d5a0; padding: 8px 14px; flex-shrink: 0; }
        .story-mode-bar.show { display: block; } .story-mode-bar .story-title { font-weight: 600; font-size: 12px; color: #8b7d3c; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .story-mode-bar .story-text { font-size: 11px; color: var(--text); max-height: 60px; overflow-y: auto; white-space: pre-wrap; background: rgba(255,255,255,0.6); padding: 6px 8px; border-radius: 8px; }
        .story-mode-bar .story-actions { display: flex; gap: 6px; margin-top: 4px; }
        .story-mode-bar .story-actions button { font-size: 10px; padding: 3px 10px; border-radius: 12px; border: 1px solid #d4c88c; background: #fff; color: #8b7d3c; cursor: pointer; }
        .story-mode-bar .story-actions button:hover { background: #fdf8e0; }
        .chat-messages-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 10px 14px; scroll-behavior: smooth; background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: local; position: relative; }
        .chat-messages-wrapper::-webkit-scrollbar { width: 3px; } .chat-messages-wrapper::-webkit-scrollbar-thumb { background: #d5ccc4; border-radius: 10px; }

        .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; font-weight: 700; overflow: hidden; }
        .msg-avatar.me-av { background: var(--avatar-me); } .msg-avatar.mj-av { background: var(--avatar-mj); }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .msg-row.me .msg-bubble { background: var(--message-self); color: var(--text); border-radius: var(--bubble-radius-me); }
        .msg-row.mj .msg-bubble { background: var(--message-other); color: var(--text); border-radius: var(--bubble-radius-other); }
        .msg-spell { background: #1a1a2e; color: #0f0; font-family: 'SF Mono','Courier New',monospace; padding: 8px 12px; border-radius: 10px; font-size: 14px; letter-spacing: 3px; text-align: center; border: 1px solid #333; }
        .msg-quote { background: rgba(0,0,0,0.05); border-left: 3px solid var(--highlight); padding: 4px 8px; border-radius: 6px; margin-bottom: 4px; font-size: 11px; color: var(--text-light); max-height: 40px; overflow: hidden; }

        .reply-preview.show { display: flex; } .reply-preview button { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 14px; }
        .emoji-picker { display: none; flex-wrap: wrap; gap: 4px; padding: 6px 14px; max-height: 160px; overflow-y: auto; background: #fdfbf8; border-top: 1px solid var(--border); }
        .emoji-picker.show { display: flex; } .emoji-item { font-size: 20px; cursor: pointer; padding: 4px 5px; border-radius: 8px; transition: var(--transition); position: relative; }
        .emoji-item:hover { background: var(--primary); transform: scale(1.2); } .emoji-item img { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; }

        .add-emoji-btn:hover { background: var(--primary); color: var(--text); }

        .draggable-mini-call.show { display: flex; } .draggable-mini-call:active { cursor: grabbing; }

        .btn-minimize-fs { background: rgba(255,255,255,0.2); color: #fff; font-size: 20px; }
        .bottom-nav { display: flex; background: var(--nav); border-top: 1px solid var(--border); flex-shrink: 0; padding: 5px 0; padding-bottom: max(5px, env(safe-area-inset-bottom)); }

        function initGomoku() {

            initGomoku();

        function renderGomoku() {
            let status;
            if (gomokuGameOver) {
                status = gomokuWinner === 'black' ? 'рҹҸҶ й»‘жЈӢ(дҪ ) иҺ·иғңпјҒ' : 'рҹҸҶ зҷҪжЈӢ(MJ) иҺ·иғңпјҒ';
            } else {
                status = `иҪ®еҲ°пјҡ${gomokuCurrent === 'black' ? 'вҡ« дҪ пјҲй»‘жЈӢпјү' : 'вҡӘ MJпјҲзҷҪжЈӢпјү'}`;
            }
            let html = `<div class="gomoku-info">${status}</div>`;
            html += `<div class="gomoku-board" id="gomokuBoard">`;
            for (let r = 0; r < GOMOKU_SIZE; r++) {
                for (let c = 0; c < GOMOKU_SIZE; c++) {
                    let cellClass = 'gomoku-cell';
                    let pieceHtml = '';
                    if (gomokuBoard[r][c]) {
                        cellClass += ' occupied';
                        let pieceClass = 'gomoku-piece ' + gomokuBoard[r][c];
                        if (gomokuGameOver && gomokuWinCells.some(wc => wc.row === r && wc.col === c)) {
                            pieceClass += ' win-highlight';
                        }
                        if (gomokuLastMove && gomokuLastMove.row === r && gomokuLastMove.col === c && !(gomokuGameOver && gomokuWinCells.some(wc => wc.row === r && wc.col === c))) {
                            pieceClass += ' last-move';
                        }
                        pieceHtml = `<div class="${pieceClass}"></div>`;
                    }
                    html += `<div class="${cellClass}" onclick="gomokuClick(${r},${c})">${pieceHtml}</div>`;
                }
            }
            html += `</div>`;
            html += `<div class="gomoku-actions"><button class="btn-primary" onclick="initGomoku();document.getElementById('fullscreenContent').innerHTML=renderGomoku();">рҹ”„ йҮҚж–°ејҖе§Ӣ</button><button class="btn-secondary" onclick="closeFullscreen()">е…ій—ӯ</button></div>`;
            return html;
        }
        function gomokuClick(r, c) {
            if (gomokuGameOver || gomokuBoard[r][c] || gomokuCurrent !== 'black') return;
            gomokuBoard[r][c] = 'black';
            gomokuLastMove = { row: r, col: c };
            let winResult = checkGomokuWinStrict(r, c, 'black');
            if (winResult) {
                gomokuGameOver = true;
                gomokuWinner = 'black';
                gomokuWinCells = winResult;
                document.getElementById('fullscreenContent').innerHTML = renderGomoku();
                return;
            }
            gomokuCurrent = 'white';
            document.getElementById('fullscreenContent').innerHTML = renderGomoku();
            setTimeout(() => { mjGomokuMove(); }, 500 + Math.random() * 600);
        }
        function mjGomokuMove() {
            if (gomokuGameOver || gomokuCurrent !== 'white') return;
            let move = findBestMove();
            if (!move) {
                let empty = [];
                for (let r = 0; r < GOMOKU_SIZE; r++) for (let c = 0; c < GOMOKU_SIZE; c++) if (!gomokuBoard[r][c]) empty.push({r,c});
                if (empty.length === 0) return;
                move = empty[Math.floor(Math.random() * empty.length)];
            }
            gomokuBoard[move.r][move.c] = 'white';
            gomokuLastMove = { row: move.r, col: move.c };
            let winResult = checkGomokuWinStrict(move.r, move.c, 'white');
            if (winResult) {
                gomokuGameOver = true;
                gomokuWinner = 'white';
                gomokuWinCells = winResult;
                document.getElementById('fullscreenContent').innerHTML = renderGomoku();
                return;
            }
            gomokuCurrent = 'black';
            document.getElementById('fullscreenContent').innerHTML = renderGomoku();
        }
        function checkGomokuWinStrict(r, c, color) {
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (let [dr, dc] of dirs) {
                let cells = [{row: r, col: c}];
                for (let i = 1; i < 5; i++) {
                    const nr = r + dr * i, nc = c + dc * i;
                    if (nr >= 0 && nr < GOMOKU_SIZE && nc >= 0 && nc < GOMOKU_SIZE && gomokuBoard[nr][nc] === color) {
                        cells.push({row: nr, col: nc});
                    } else break;
                }
                for (let i = 1; i < 5; i++) {
                    const nr = r - dr * i, nc = c - dc * i;
                    if (nr >= 0 && nr < GOMOKU_SIZE && nc >= 0 && nc < GOMOKU_SIZE && gomokuBoard[nr][nc] === color) {
                        cells.unshift({row: nr, col: nc});
                    } else break;
                }
                if (cells.length >= 5) {
                    cells.sort((a,b) => a.row - b.row || a.col - b.col);
                    return cells.slice(0, 5);
                }
            }
            return null;
        }
        function findBestMove() {
            let bestScore = -Infinity;
            let bestMove = null;
            for (let r = 0; r < GOMOKU_SIZE; r++) {
                for (let c = 0; c < GOMOKU_SIZE; c++) {
                    if (gomokuBoard[r][c]) continue;
                    let attackScore = evaluatePosition(r, c, 'white');
                    let defenseScore = evaluatePosition(r, c, 'black');
                    let totalScore = attackScore * 0.9 + defenseScore * 1.2;
                    if (totalScore > bestScore) {
                        bestScore = totalScore;
                        bestMove = { r, c };
                    }
                }
            }
            return bestMove;
        }
        function evaluatePosition(r, c, color) {
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            let totalScore = 0;
            gomokuBoard[r][c] = color;
            for (let [dr, dc] of dirs) {
                let count = 1;
                let openEnds = 0;
                for (let i = 1; i <= 5; i++) {
                    const nr = r + dr * i, nc = c + dc * i;
                    if (nr >= 0 && nr < GOMOKU_SIZE && nc >= 0 && nc < GOMOKU_SIZE && gomokuBoard[nr][nc] === color) count++;
                    else { if (nr >= 0 && nr < GOMOKU_SIZE && nc >= 0 && nc < GOMOKU_SIZE && !gomokuBoard[nr][nc]) openEnds++; break; }
                }
                for (let i = 1; i <= 5; i++) {
                    const nr = r - dr * i, nc = c - dc * i;
                    if (nr >= 0 && nr < GOMOKU_SIZE && nc >= 0 && nc < GOMOKU_SIZE && gomokuBoard[nr][nc] === color) count++;
                    else { if (nr >= 0 && nr < GOMOKU_SIZE && nc >= 0 && nc < GOMOKU_SIZE && !gomokuBoard[nr][nc]) openEnds++; break; }
                }
                if (count >= 5) totalScore += 100000;
                else if (count === 4 && openEnds >= 1) totalScore += 10000;
                else if (count === 3 && openEnds >= 2) totalScore += 1000;
                else if (count === 3 && openEnds >= 1) totalScore += 300;
                else if (count === 2 && openEnds >= 2) totalScore += 100;
                else if (count === 2 && openEnds >= 1) totalScore += 20;
                else totalScore += count;
            }
            gomokuBoard[r][c] = null;
            return totalScore;
        }

                if (!backgroundMsgTimer) scheduleBackgroundMsg();
            } else {
                clearBackgroundMsgTimer();
                if (currentPage === 'chatWindow') renderChatMessages();
                // йҮҚж–°еҗҜеҠЁе®ҡж—¶еҷЁпјҢд»ҘдҫҝеҗҺеҸ°еҶҚж¬Ўз”ҹж•Ҳ
                scheduleBackgroundMsg();
            }
        }

        function scheduleBackgroundMsg() {
            const delay = 120000 + Math.random() * 300000; // 2~7еҲҶй’ҹ
            backgroundMsgTimer = setTimeout(() => {
                generateRandomMJMessage();
                scheduleBackgroundMsg();
            }, delay);
        }

        function generateRandomMJMessage() {
            const allPhrases = [];
            Object.values(appData.replyPhrases).forEach(arr => allPhrases.push(...arr));
            if (allPhrases.length === 0) allPhrases.push('рҹҳҠ');
            const msgText = allPhrases[Math.floor(Math.random() * allPhrases.length)];
            const newMsg = {
                id: 'bg_msg_' + Date.now(),
                from: 'mj',
                content: msgText,
                time: Date.now()
            };
            appData.messages.push(newMsg);
            saveData();
            if (document.hidden && typeof Notification !== 'undefined' && Notification.permission === 'granted') {
                new Notification('MJ еҸ‘жқҘж¶ҲжҒҜ', {
                    body: msgText,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">рҹҗұ</text></svg>'
                });
            } else if (!document.hidden && currentPage === 'chatWindow') {
                renderChatMessages();
            }
        }

        function init() { 
            loadData(); 
            updateHeaderDisplay(); 
            renderChatMessages(); 
            renderAppDesktop(); 
            applyChatBackground(); 
            applyCurrentTheme(); 
            initEmojiPicker(); 
            requestNotificationPermission();
            startMJStatusAutoSwitch(); 
            startMJIncomingCallTimer(); 
            startMJAutoWater(); 
            startMJSpellTimer(); 
            manageBackgroundMessages();
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && callState.active) endCall('reject'); }); 
        }
        init();
    </script>
</body>
</html>
